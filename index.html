<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e起护网 青春护航 - 网络安全知识挑战赛</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 粒子背景 -->
    <canvas id="particles"></canvas>

    <!-- 开始界面 -->
    <div id="start-screen" class="screen active">
        <div class="container">
            <div class="logo-wrapper">
                <div class="shield-icon">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#00d4ff"/>
                                <stop offset="100%" style="stop-color:#7b2ff7"/>
                            </linearGradient>
                        </defs>
                        <path d="M50 5 L90 25 L90 55 C90 75 70 90 50 95 C30 90 10 75 10 55 L10 25 Z"
                              fill="url(#shieldGrad)" opacity="0.9"/>
                        <path d="M50 15 L80 30 L80 55 C80 70 65 82 50 87 C35 82 20 70 20 55 L20 30 Z"
                              fill="none" stroke="white" stroke-width="2"/>
                        <text x="50" y="60" text-anchor="middle" fill="white" font-size="30" font-weight="bold">盾</text>
                    </svg>
                </div>
                <h1 class="title">
                    <span class="title-main">e起护网</span>
                    <span class="title-sub">青春护航</span>
                </h1>
                <p class="subtitle">网络安全知识挑战赛</p>
            </div>

            <div class="start-info">
                <div class="info-card">
                    <div class="info-icon">📋</div>
                    <div class="info-text">
                        <strong>比赛规则</strong>
                        <p>共20道题目，每题5分，满分100分</p>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-icon">⏱️</div>
                    <div class="info-text">
                        <strong>答题时间</strong>
                        <p>每题限时30秒</p>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-icon">🛡️</div>
                    <div class="info-text">
                        <strong>知识范围</strong>
                        <p>网络安全法、个人信息保护、防范诈骗等</p>
                    </div>
                </div>
            </div>

            <div class="player-input">
                <input type="text" id="player-name" placeholder="请输入您的昵称" maxlength="10">
            </div>

            <button class="btn-start" onclick="startGame()">
                <span>开始挑战</span>
                <div class="btn-particles"></div>
            </button>
        </div>
    </div>

    <!-- 游戏界面 -->
    <div id="game-screen" class="screen">
        <div class="container">
            <!-- 顶部状态栏 -->
            <div class="status-bar">
                <div class="status-left">
                    <span class="player-display">👤 <span id="display-name"></span></span>
                    <span class="score-display">🏆 得分: <span id="score">0</span></span>
                </div>
                <div class="status-right">
                    <span class="question-count">📝 <span id="current-q">1</span>/20</span>
                    <span class="timer" id="timer">⏱️ 30</span>
                </div>
            </div>

            <!-- 进度条 -->
            <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
            </div>

            <!-- 题目区域 -->
            <div class="question-area">
                <div class="question-category" id="category">网络安全法</div>
                <h2 class="question-text" id="question-text"></h2>
            </div>

            <!-- 选项区域 -->
            <div class="options-area" id="options-area">
                <!-- 选项将通过JS动态生成 -->
            </div>

            <!-- 反馈提示 -->
            <div class="feedback" id="feedback">
                <div class="feedback-icon"></div>
                <div class="feedback-text"></div>
            </div>

            <!-- 下一题按钮 -->
            <button class="btn-next" id="btn-next" onclick="nextQuestion()" style="display:none">
                下一题 →
            </button>
        </div>
    </div>

    <!-- 结果界面 -->
    <div id="result-screen" class="screen">
        <div class="container">
            <div class="result-card">
                <div class="result-header">
                    <div class="result-icon" id="result-icon">🏆</div>
                    <h2 class="result-title" id="result-title">挑战完成！</h2>
                </div>

                <div class="score-circle">
                    <svg viewBox="0 0 200 200">
                        <circle class="score-bg" cx="100" cy="100" r="85"/>
                        <circle class="score-fill" id="score-circle" cx="100" cy="100" r="85"/>
                    </svg>
                    <div class="score-value">
                        <span id="final-score">0</span>
                        <small>分</small>
                    </div>
                </div>

                <div class="result-stats">
                    <div class="stat">
                        <span class="stat-value" id="correct-count">0</span>
                        <span class="stat-label">答对</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="wrong-count">0</span>
                        <span class="stat-label">答错</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="accuracy">0%</span>
                        <span class="stat-label">正确率</span>
                    </div>
                </div>

                <div class="result-rank" id="result-rank">
                    <!-- 评级将通过JS动态生成 -->
                </div>

                <div class="result-message" id="result-message">
                    <!-- 鼓励语将通过JS动态生成 -->
                </div>

                <div class="result-actions">
                    <button class="btn-restart" onclick="restartGame()">
                        🔄 再来一次
                    </button>
                    <button class="btn-review" onclick="reviewAnswers()">
                        📖 查看解析
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 解析界面 -->
    <div id="review-screen" class="screen">
        <div class="container">
            <div class="review-header">
                <h2>📝 答案解析</h2>
                <button class="btn-back" onclick="goToResult()">← 返回结果</button>
            </div>
            <div class="review-list" id="review-list">
                <!-- 解析内容将通过JS动态生成 -->
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
